# JARVIS context-budget caps — SINGLE SOURCE OF TRUTH (characters).
#
# This is the ONLY place caps are defined. Both scripts/check-memory-caps.sh
# and setup/check.sh read this file. Change a cap HERE, nowhere else.
# CLAUDE.md's "Memory File Caps" table is a human-readable mirror — keep it in
# sync, but THIS file is what the enforcement scripts actually use.
#
# Format: <path-relative-to-jarvis-root>:<cap-in-chars>   (# comments allowed)
#   - A path ending in '/' caps the SUM of *.md directly under that directory.
# Guard: tests/test-caps-single-source.sh fails if any script re-hardcodes a cap.
#
# ── ALL CAPS ARE ADVISORY ─────────────────────────────────────────────────────
# The checkers report and exit non-zero over cap; nothing blocks or truncates a
# write (there is no PreToolUse write-gate wired). A cap is a budget signal, not
# a hard limit — and a coarse guard against runaway file growth, NOT a measure of
# whether content is still live. Dead/unreachable content is found by
# scripts/check-staleness.sh (age) and scripts/reachability-gc.py (reachability),
# not by size.
#
# ── TWO TIERS, TWO PURPOSES ───────────────────────────────────────────────────
# ALWAYS-LOADED  — paid in tokens + attention on EVERY turn. Tight caps here are
#                  real discipline: this is where the per-turn budget is spent.
# ON-DEMAND (L2) — loaded only when the session topic warrants. Cost is paid only
#                  when loaded, so caps here are a loose anti-bloat ceiling, not a
#                  per-turn lever. Deliberately generous (~1M-token windows make a
#                  small char cap on a rarely-loaded file pointless).

# ── Always-loaded tier (paid every turn — keep lean) ──────────────────────────
CLAUDE.md:38000
.claude/rules/:44000
memory/L1-critical-facts.md:5000
memory/core.md:8000

# ── Roots loaded often (lean-ish) ─────────────────────────────────────────────
memory/soul.md:18000

# ── On-demand L2 (loaded only when relevant — generous anti-bloat ceiling) ────
memory/context.md:50000
memory/decisions.md:40000
memory/learnings.md:50000
memory/relationships.md:30000
