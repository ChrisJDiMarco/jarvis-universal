<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">JARVIS Universal Control Center preview</title>
  <desc id="desc">A premium local AI OS dashboard with mission queue, agent mesh, memory, channels, and security controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#121417"/>
      <stop offset="1" stop-color="#0b0d0f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
