    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#101828" stroke-opacity=".055"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" rx="30" fill="url(#bg)"/>
