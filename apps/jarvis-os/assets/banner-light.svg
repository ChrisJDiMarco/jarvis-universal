<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f4f9"/>
      <stop offset="50%" stop-color="#edeaf6"/>
      <stop offset="100%" stop-color="#f5f4f9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="logo-bg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="300" stroke="#6366f1" stroke-width="1" transform="translate(60,0)"/>
    <line x1="0" y1="0" x2="0" y2="300" stroke="#6366f1" stroke-width="1" transform="translate(120,0)"/>
    <line x1="0" y1="0" x2="0" y2="300" stroke="#6366f1" stroke-width="1" transform="translate(180,0)"/>
    <line x1="0" y1="0" x2="0" y2="300" stroke="#6366f1" stroke-width="1" transform="translate(240,0)"/>
    <line x1="0" y1="0" x2="0" y2="300" stroke="#6366f1" stroke-width="1" transform="translate(960,0)"/>
    <line x1="0" y1="0" x2="0" y2="300" stroke="#6366f1" stroke-width="1" transform="translate(1020,0)"/>
    <line x1="0" y1="0" x2="0" y2="300" stroke="#6366f1" stroke-width="1" transform="translate(1080,0)"/>
    <line x1="0" y1="0" x2="0" y2="300" stroke="#6366f1" stroke-width="1" transform="translate(1140,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#6366f1" stroke-width="1" transform="translate(0,60)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#6366f1" stroke-width="1" transform="translate(0,120)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#6366f1" stroke-width="1" transform="translate(0,180)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#6366f1" stroke-width="1" transform="translate(0,240)"/>
  </g>

  <!-- Floating orbs -->
  <circle cx="150" cy="80" r="120" fill="#6366f1" opacity="0.04" filter="url(#glow)"/>
  <circle cx="1050" cy="220" r="100" fill="#8b5cf6" opacity="0.04" filter="url(#glow)"/>
  <circle cx="900" cy="60" r="60" fill="#06b6d4" opacity="0.03" filter="url(#glow)"/>

  <!-- Accent line at top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Logo hexagon -->
  <g transform="translate(516, 55)">
    <rect width="56" height="56" rx="15" fill="url(#logo-bg)" filter="url(#shadow)"/>
    <text x="28" y="38" text-anchor="middle" font-size="28" fill="white" font-family="system-ui, -apple-system, sans-serif">&#x2B21;</text>
  </g>

  <!-- Title -->
  <text x="600" y="148" text-anchor="middle" font-size="48" font-weight="800" fill="#1e1a3a" font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif" letter-spacing="-2">JARVIS OS</text>

  <!-- Tagline -->
  <text x="600" y="182" text-anchor="middle" font-size="17" fill="#5c5880" font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif" letter-spacing="0.5">A command center for AI minds</text>

  <!-- Subtitle line -->
  <text x="600" y="210" text-anchor="middle" font-size="13" fill="#9a96b4" font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif" letter-spacing="0.3">Each mind has its own personality, memory, and skills — powered by Claude</text>

  <!-- Bottom decorative dots -->
  <g transform="translate(555, 240)" opacity="0.5">
    <circle cx="0" cy="0" r="3" fill="#6366f1"/>
    <circle cx="22" cy="0" r="3" fill="#8b5cf6"/>
    <circle cx="44" cy="0" r="3" fill="#a78bfa"/>
    <circle cx="66" cy="0" r="3" fill="#06b6d4"/>
    <circle cx="88" cy="0" r="3" fill="#8b5cf6"/>
  </g>

  <!-- Bottom border -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#accent)" opacity="0.2"/>
</svg>
