<svg width="840" height="200" viewBox="0 0 840 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c1a30"/>
      <stop offset="100%" stop-color="#16142a"/>
    </linearGradient>
    <linearGradient id="atlas-g" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="strat-g" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8913a"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="forge-g" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#3a9e6e"/>
    </linearGradient>
    <linearGradient id="scribe-g" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#c74a8a"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Card 1: Atlas -->
  <g transform="translate(0, 8)" filter="url(#card-shadow)">
    <rect width="196" height="184" rx="16" fill="url(#card-bg)" stroke="#2d2a4a" stroke-width="1"/>
    <rect width="196" height="3" rx="1.5" fill="#6366f1" opacity="0.8"/>
    <rect x="24" y="28" width="44" height="44" rx="12" fill="url(#atlas-g)" opacity="0.15"/>
    <text x="46" y="58" text-anchor="middle" font-size="22">&#x1F9E0;</text>
    <text x="24" y="100" font-size="16" font-weight="700" fill="#e8e6f0" font-family="system-ui, -apple-system, sans-serif">Atlas</text>
    <text x="24" y="118" font-size="11" fill="#818cf8" font-family="system-ui, -apple-system, sans-serif" font-weight="600">Second Brain</text>
    <text x="24" y="140" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">Persistent context,</text>
    <text x="24" y="154" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">executive function,</text>
    <text x="24" y="168" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">personal life OS</text>
  </g>

  <!-- Card 2: Strategos -->
  <g transform="translate(214, 8)" filter="url(#card-shadow)">
    <rect width="196" height="184" rx="16" fill="url(#card-bg)" stroke="#2d2a4a" stroke-width="1"/>
    <rect width="196" height="3" rx="1.5" fill="#e8913a" opacity="0.8"/>
    <rect x="24" y="28" width="44" height="44" rx="12" fill="url(#strat-g)" opacity="0.15"/>
    <text x="46" y="58" text-anchor="middle" font-size="22">&#x265F;&#xFE0F;</text>
    <text x="24" y="100" font-size="16" font-weight="700" fill="#e8e6f0" font-family="system-ui, -apple-system, sans-serif">Strategos</text>
    <text x="24" y="118" font-size="11" fill="#f59e0b" font-family="system-ui, -apple-system, sans-serif" font-weight="600">Strategy &amp; Business</text>
    <text x="24" y="140" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">Competitive analysis,</text>
    <text x="24" y="154" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">decision frameworks,</text>
    <text x="24" y="168" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">go-to-market planning</text>
  </g>

  <!-- Card 3: Forge -->
  <g transform="translate(428, 8)" filter="url(#card-shadow)">
    <rect width="196" height="184" rx="16" fill="url(#card-bg)" stroke="#2d2a4a" stroke-width="1"/>
    <rect width="196" height="3" rx="1.5" fill="#10b981" opacity="0.8"/>
    <rect x="24" y="28" width="44" height="44" rx="12" fill="url(#forge-g)" opacity="0.15"/>
    <text x="46" y="58" text-anchor="middle" font-size="22">&#x2692;&#xFE0F;</text>
    <text x="24" y="100" font-size="16" font-weight="700" fill="#e8e6f0" font-family="system-ui, -apple-system, sans-serif">Forge</text>
    <text x="24" y="118" font-size="11" fill="#10b981" font-family="system-ui, -apple-system, sans-serif" font-weight="600">Engineering &amp; Code</text>
    <text x="24" y="140" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">Architecture, debugging,</text>
    <text x="24" y="154" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">code review, system</text>
    <text x="24" y="168" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">design patterns</text>
  </g>

  <!-- Card 4: Scribe -->
  <g transform="translate(642, 8)" filter="url(#card-shadow)">
    <rect width="196" height="184" rx="16" fill="url(#card-bg)" stroke="#2d2a4a" stroke-width="1"/>
    <rect width="196" height="3" rx="1.5" fill="#c74a8a" opacity="0.8"/>
    <rect x="24" y="28" width="44" height="44" rx="12" fill="url(#scribe-g)" opacity="0.15"/>
    <text x="46" y="58" text-anchor="middle" font-size="22">&#x270D;&#xFE0F;</text>
    <text x="24" y="100" font-size="16" font-weight="700" fill="#e8e6f0" font-family="system-ui, -apple-system, sans-serif">Scribe</text>
    <text x="24" y="118" font-size="11" fill="#ec4899" font-family="system-ui, -apple-system, sans-serif" font-weight="600">Research &amp; Writing</text>
    <text x="24" y="140" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">Deep research, content</text>
    <text x="24" y="154" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">synthesis, knowledge</text>
    <text x="24" y="168" font-size="11" fill="#6b6690" font-family="system-ui, -apple-system, sans-serif">building at scale</text>
  </g>
</svg>
