<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- PAGE TITLE --></title>

  <!-- Fonts: Satoshi (display) + Inter (body) — Satoshi is the 2026 premium SaaS standard -->
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..600&display=swap" rel="stylesheet">

  <!-- GSAP 3.12 + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- Three.js r128 (Cowork-stable) — OPTIONAL: remove if using CSS 3D mockup instead -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Lenis smooth scroll -->
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

  <style>
    /* ─────────────────────────────────────────
       RESET + BASE
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ─────────────────────────────────────────
       DESIGN TOKENS
    ───────────────────────────────────────── */
    :root {
      /* Surfaces */
      --bg:         #080808;
      --surface:    #111111;
      --elevated:   #1a1a1a;

      /* Borders */
      --border-subtle:  rgba(255,255,255,0.06);
      --border-default: rgba(255,255,255,0.10);
      --border-strong:  rgba(255,255,255,0.18);

      /* Text */
      --text:         rgba(255,255,255,0.92);
      --text-muted:   rgba(255,255,255,0.50);
      --text-faint:   rgba(255,255,255,0.30);

      /* Accent — change this one var to retheme the whole page */
      --accent:       #6366f1;
      --accent-light: #818cf8;
      --accent-glow:  rgba(99, 102, 241, 0.25);

      /* Typography scale (fluid) */
      --text-xs:    clamp(0.70rem, 0.9vw,   0.80rem);
      --text-sm:    clamp(0.85rem, 1.1vw,   0.95rem);
      --text-base:  clamp(1.00rem, 1.4vw,   1.10rem);
      --text-lg:    clamp(1.15rem, 1.8vw,   1.30rem);
      --text-xl:    clamp(1.30rem, 2.2vw,   1.60rem);
      --text-2xl:   clamp(1.60rem, 3.0vw,   2.20rem);
      --text-3xl:   clamp(2.00rem, 4.5vw,   3.50rem);
      --text-hero:  clamp(3.00rem, 8.0vw,   8.00rem);

      /* Spacing */
      --space-section: clamp(64px, 10vw, 128px);
      --space-gap:     clamp(16px, 3vw,  32px);
      --container-pad: clamp(16px, 5vw,  80px);

      /* Soft UI / Neumorphic 2026 — card shadow system */
      --shadow-card:
        0 1px 0 rgba(255,255,255,0.055) inset,
        0 -1px 0 rgba(0,0,0,0.45) inset,
        0 24px 56px rgba(0,0,0,0.48),
        0 0 0 0.5px rgba(255,255,255,0.06);
      --shadow-card-hover:
        0 1px 0 rgba(255,255,255,0.07) inset,
        0 -1px 0 rgba(0,0,0,0.5) inset,
        0 32px 72px rgba(0,0,0,0.55),
        0 0 0 0.5px rgba(99,102,241,0.3);
      --shadow-button:
        0 1px 0 rgba(255,255,255,0.15) inset,
        0 8px 24px rgba(99,102,241,0.3);
    }

    /* ─────────────────────────────────────────
       GLOBAL
    ───────────────────────────────────────── */
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: var(--text-base);
      line-height: 1.65;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain overlay — always on, 4% opacity */
    body::after {
      content: '';
      position: fixed; inset: -50%; width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 9999;
      animation: grain 0.5s steps(2) infinite;
    }
    @keyframes grain {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-3%,-5%); }
      50%  { transform: translate(5%,3%); }
      75%  { transform: translate(-5%,7%); }
    }

    /* ─────────────────────────────────────────
       LAYOUT
    ───────────────────────────────────────── */
    .container {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--container-pad);
    }

    .section {
      padding: var(--space-section) 0;
      position: relative;
    }

    /* ─────────────────────────────────────────
       TYPOGRAPHY
    ───────────────────────────────────────── */
    .display {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: var(--text-hero);
      letter-spacing: -0.04em;
      line-height: 0.95;
    }

    .heading-1 {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: var(--text-3xl);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .heading-2 {
      font-family: 'Satoshi', sans-serif;
      font-weight: 600;
      font-size: var(--text-2xl);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .label {
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .gradient-text {
      background: linear-gradient(135deg, #e0e0ff 0%, var(--accent) 40%, #a855f7 70%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─────────────────────────────────────────
       COMPONENTS
    ───────────────────────────────────────── */

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      font-size: var(--text-sm);
      font-weight: 500;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(0) !important; }

    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-default);
    }
    .btn-ghost:hover {
      border-color: var(--border-strong);
      background: rgba(255,255,255,0.04);
      transform: translateY(-1px);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: clamp(20px, 3vw, 32px);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }
    .card:hover { border-color: var(--border-default); }

    /* Glass */
    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border-subtle);
    }

    /* Navigation */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 0;
      transition: padding 0.3s ease, background 0.3s ease, backdrop-filter 0.3s ease;
    }
    .nav.scrolled {
      padding: 12px 0;
      background: rgba(8,8,8,0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border-subtle);
    }
    .nav__inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav__logo {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
    }

    /* Mesh background */
    .mesh-bg {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(99,102,241,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(168,85,247,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 60% 80%, rgba(236,72,153,0.08) 0%, transparent 50%);
    }

    /* Glow orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    /* Progress bar */
    .scroll-progress {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, var(--accent), #a855f7, #ec4899);
      transform-origin: left;
      transform: scaleX(0);
      z-index: 101;
    }

    /* Reveal animation states */
    .reveal { opacity: 0; transform: translateY(40px); }

    /* Bento grid */
    .bento {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: var(--space-gap);
    }
    @media (max-width: 768px) {
      .bento > * { grid-column: 1 / -1 !important; grid-row: auto !important; }
    }

  </style>
</head>
<body>

  <!-- SCROLL PROGRESS -->
  <div class="scroll-progress" id="scroll-progress"></div>

  <!-- NAVIGATION -->
  <nav class="nav" id="main-nav">
    <div class="container">
      <div class="nav__inner">
        <a href="/" class="nav__logo">LOGO</a>
        <div class="nav__links">
          <!-- nav links here -->
        </div>
        <a href="#" class="btn btn-primary" style="font-size:0.8rem; padding:9px 18px;">Get Started</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="section mesh-bg" style="min-height:100vh; display:flex; align-items:center; padding-top:120px;">
    <!-- Ambient orbs -->
    <div class="orb" style="width:600px; height:600px; background:rgba(99,102,241,0.1); top:-200px; left:-150px;"></div>
    <div class="orb" style="width:400px; height:400px; background:rgba(168,85,247,0.08); bottom:-100px; right:-100px;"></div>

    <div class="container" style="position:relative; z-index:1;">
      <p class="label reveal" style="margin-bottom:24px;">LABEL TEXT HERE</p>
      <h1 class="display reveal" style="max-width:900px; margin-bottom:28px;">
        Headline That <span class="gradient-text">Changes Everything</span>
      </h1>
      <p style="font-size:var(--text-lg); color:var(--text-muted); max-width:560px; margin-bottom:48px;" class="reveal">
        Supporting description text. Keep it focused on the single biggest value prop.
      </p>
      <div style="display:flex; gap:16px; flex-wrap:wrap;" class="reveal">
        <a href="#" class="btn btn-primary">Primary Action</a>
        <a href="#" class="btn btn-ghost">Secondary Action</a>
      </div>
    </div>
  </section>

  <!-- ADD MORE SECTIONS HERE -->

  <script>
    // ─────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────
    gsap.registerPlugin(ScrollTrigger);

    // Lenis smooth scroll
    const lenis = new Lenis({
      duration: 1.2,
      easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
    });
    gsap.ticker.add(time => lenis.raf(time * 1000));
    gsap.ticker.lagSmoothing(0);

    // Sticky nav
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    // Scroll progress
    gsap.to('#scroll-progress', {
      scaleX: 1,
      ease: 'none',
      scrollTrigger: { start: 'top top', end: 'bottom bottom', scrub: 0 }
    });

    // Reveal animations
    ScrollTrigger.batch('.reveal', {
      onEnter: els => gsap.to(els, {
        opacity: 1, y: 0,
        duration: 0.8, stagger: 0.1, ease: 'power3.out', overwrite: true
      }),
      start: 'top 88%',
      once: true
    });

    // ─────────────────────────────────────────
    // YOUR CUSTOM ANIMATIONS HERE
    // ─────────────────────────────────────────

  </script>
</body>
</html>
