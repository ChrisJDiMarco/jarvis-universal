  Fonts CDN is CSS only — loads fine.
  All animations: CSS @keyframes + IntersectionObserver + vanilla JS.

<style>
/* ── RESET ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: #070d1a;
  color: #e8eef8;
  font-family: 'Satoshi', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
  cursor: none;
}
@media (pointer: coarse) { body { cursor: auto; } }
a { color: inherit; text-decoration: none; }

/* ── GRAIN TEXTURE ──────────────────────────── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9000;
  pointer-events: none; opacity: .03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
}

/* ── CUSTOM CURSOR ────────────────────────── */
#cur-dot, #cur-ring {
  position: fixed; border-radius: 50%; pointer-events: none;
  z-index: 9999; transform: translate(-50%, -50%);
}
#cur-dot { width: 7px; height: 7px; background: #6366f1; transition: transform .15s; }
#cur-ring {
  width: 34px; height: 34px;
  border: 1.5px solid rgba(99,102,241,.5);
  transition: width .3s, height .3s, border-color .3s;
}
@media (pointer: coarse) { #cur-dot, #cur-ring { display: none; } }

/* ── NAV ─────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 800;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5vw; height: 70px;
  transition: background .35s, backdrop-filter .35s, border-color .35s;
  border-bottom: 1px solid transparent;
}
nav.scrolled {
  background: rgba(7,13,26,.88);
  backdrop-filter: blur(18px) saturate(180%);
  border-color: rgba(99,102,241,.09);
}

/* ── HERO ENTRANCE KEYFRAMES ─────────────── */
@keyframes fadeUp    { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeRight { from { opacity:0; transform:translateX(36px); } to { opacity:1; transform:translateX(0); } }
@keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
@keyframes pulse     { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }

/* Hero elements — animation-fill-mode:both holds final state */
.h-badge  { animation: fadeUp .55s .15s both ease-out; }
.h-h1     { animation: fadeUp .70s .30s both ease-out; }
.h-sub    { animation: fadeUp .65s .45s both ease-out; }
.h-ctas   { animation: fadeUp .60s .58s both ease-out; }
.h-trust  { animation: fadeUp .60s .70s both ease-out; }
.h-visual { animation: fadeRight .80s .50s both ease-out; }

/* ── SCROLL REVEAL CLASSES ───────────────── */
.reveal {
  opacity: 0; transform: translateY(26px);
  transition: opacity .7s ease-out, transform .7s ease-out;
}
.reveal.vis { opacity: 1; transform: translateY(0); }

.reveal-x {
  opacity: 0; transform: translateX(36px);
  transition: opacity .8s ease-out, transform .8s ease-out;
}
.reveal-x.vis { opacity: 1; transform: translateX(0); }

/* Stagger: parent = .stagger, children animate in sequence */
.stagger > * {
  opacity: 0; transform: translateY(28px);
  transition: opacity .6s ease-out, transform .6s ease-out;
}
.stagger.vis > *:nth-child(1)  { transition-delay: .04s; }
.stagger.vis > *:nth-child(2)  { transition-delay: .12s; }
.stagger.vis > *:nth-child(3)  { transition-delay: .20s; }
.stagger.vis > *:nth-child(4)  { transition-delay: .28s; }
.stagger.vis > *:nth-child(5)  { transition-delay: .36s; }
.stagger.vis > *:nth-child(6)  { transition-delay: .44s; }
.stagger.vis > *:nth-child(7)  { transition-delay: .52s; }
.stagger.vis > *:nth-child(8)  { transition-delay: .60s; }
.stagger.vis > * { opacity: 1; transform: translateY(0); }

/* ── MARQUEE ─────────────────────────────── */
.marquee-wrap { overflow: hidden; }
.marquee-track { display: flex; width: max-content; animation: marquee 28s linear infinite; }
@keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.marquee-wrap:hover .marquee-track { animation-play-state: paused; }

/* ── CARDS / SOFT UI ─────────────────────── */
.card {
  background: linear-gradient(150deg, #111120, #0d0d1a);
  border-radius: 16px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.055) inset,
    0 -1px 0 rgba(0,0,0,.45) inset,
    0 24px 56px rgba(0,0,0,.48),
    0 0 0 0.5px rgba(255,255,255,.06);
  transition: transform .3s cubic-bezier(.16,1,.3,1), box-shadow .3s;
}
.card:hover {
  transform: translateY(-6px);
  box-shadow:
    0 1px 0 rgba(255,255,255,.07) inset,
    0 -1px 0 rgba(0,0,0,.5) inset,
    0 32px 72px rgba(0,0,0,.55),
    0 0 0 0.5px rgba(99,92,246,.3);
}

/* ── BUTTONS ─────────────────────────────── */
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  background: #6366f1; color: #fff;
  padding: 14px 32px; border-radius: 12px;
  font-weight: 700; font-size: 1rem;
  box-shadow: 0 4px 24px rgba(99,102,241,.38);
  transition: transform .2s, box-shadow .2s, background .2s;
  position: relative; overflow: hidden;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 40px rgba(99,102,241,.52);
  background: #818cf8;
}

/* ── TYPOGRAPHY UTILITIES ───────────────── */
.display {
  font-size: clamp(2.8rem, 5.5vw, 5rem);
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1.04;
  color: #fff;
}
.gradient-text {
  background: linear-gradient(130deg, #c4b5fd 0%, #8b5cf6 40%, #06b6d4 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.label {
  font-size: .75rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em;
  color: #818cf8;
}

/* ── REDUCED MOTION ──────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
  }
}

<!-- ══════════════════════════════════════════
     VANILLA JS BOOTSTRAP — NO EXTERNAL DEPS
     ══════════════════════════════════════ -->
<script>
// ── CURSOR ────────────────────────────────────
const dot = document.getElementById('cur-dot');
const ring = document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
if (dot && ring) {
  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY;
    dot.style.left=mx+'px'; dot.style.top=my+'px';
  });
  (function loop(){ rx+=(mx-rx)*.11; ry+=(my-ry)*.11; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })();
  document.querySelectorAll('a,button,.card,.area').forEach(el=>{
    el.addEventListener('mouseenter',()=>{ dot.style.transform='translate(-50%,-50%) scale(.4)'; ring.style.width='50px'; ring.style.height='50px'; });
    el.addEventListener('mouseleave',()=>{ dot.style.transform='translate(-50%,-50%)'; ring.style.width='34px'; ring.style.height='34px'; });
  });
}

// ── STICKY NAV ────────────────────────────────
window.addEventListener('scroll',()=>{
  document.getElementById('nav')?.classList.toggle('scrolled', window.scrollY>60);
},{passive:true});

// ── SCROLL REVEAL (IntersectionObserver) ──────
const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting) return;
    e.target.classList.add('vis');
    e.target.querySelectorAll('.counter').forEach(animCounter);
    io.unobserve(e.target);
  });
},{threshold:0.1});
document.querySelectorAll('.reveal,.reveal-x,.stagger').forEach(el=>io.observe(el));

// ── COUNTER ANIMATION ─────────────────────────
function animCounter(el){
  const target=+el.dataset.target, dur=2100, t0=performance.now();
  (function tick(now){
    const p=Math.min((now-t0)/dur,1);
    el.textContent=Math.round((1-Math.pow(1-p,3))*target).toLocaleString();
    if(p<1) requestAnimationFrame(tick);
  })(t0);
}

// ── MAGNETIC BUTTONS ──────────────────────────
document.querySelectorAll('.magnetic').forEach(btn=>{
  btn.addEventListener('mousemove',e=>{
    const r=btn.getBoundingClientRect();
    btn.style.transform=`translate(${(e.clientX-r.left-r.width/2)*.28}px,${(e.clientY-r.top-r.height/2)*.28}px)`;
  });
  btn.addEventListener('mouseleave',()=>{
    btn.style.transition='transform .5s cubic-bezier(.34,1.56,.64,1)';
    btn.style.transform='';
    setTimeout(()=>btn.style.transition='',520);
  });
});

// ── HERO GRID PARALLAX (mouse) ─────────────────
const hgrid = document.querySelector('.h-grid');
if(hgrid) {
  window.addEventListener('mousemove',e=>{
    hgrid.style.transform=`translate(${(e.clientX/innerWidth-.5)*14}px,${(e.clientY/innerHeight-.5)*9}px)`;
  },{passive:true});
}

// ── ANCHOR SMOOTH SCROLL ──────────────────────
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',e=>{
    const t=document.querySelector(a.getAttribute('href'));
    if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth',block:'start'});}
  });
});
</script>
